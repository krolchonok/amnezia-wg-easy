volumes:
  etc_wireguard:

services:
  amnezia-wg-easy:
    env_file:
      - .env
    build: .
    image: ghcr.io/krolchonok/amnezia-wg-easy
    container_name: amnezia-wg-easy
    volumes:
      - etc_wireguard:/etc/wireguard
      # - ./ssl/cert.pem:/etc/ssl/certs/ssl-cert.pem:ro   # ⚠️ Uncomment for SSL
      # - ./ssl/key.pem:/etc/ssl/private/ssl-key.pem:ro    # ⚠️ Uncomment for SSL
    ports:
      - "${WG_PORT}:${WG_PORT}/udp"
      - "${PORT}:${PORT}/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      # - NET_RAW # ⚠️ Uncomment if using Podman
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    devices:
    - /dev/net/tun:/dev/net/tun
